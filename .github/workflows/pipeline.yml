name: CI/CD ML Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Linter: lightweight gate, must pass before train runs
  # ════════════════════════════════════════════════════════════════
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: flake8 . --max-line-length=120 --exclude=.dvc,__pycache__

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Train: only runs if ALL 3 conditions are met:
  #   1. linter job passed
  #   2. branch is main (or master)
  #   3. commit message contains [run-train]
  # ════════════════════════════════════════════════════════════════
  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pip install dvc "dvc[http]"
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      # ── Main training step ───────────────────────────────────────
      - name: Train model
        id: train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python train.py

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      # ── Runs ONLY if a previous step failed ─────────────────────
      - name: Capture error logs on failure
        if: failure()
        run: |
          echo "=== Training failed at $(date) ===" > error_logs.txt
          echo "Branch:  ${{ github.ref }}"        >> error_logs.txt
          echo "Commit:  ${{ github.sha }}"        >> error_logs.txt
          echo "Message: ${{ github.event.head_commit.message }}" >> error_logs.txt
          echo ""                                  >> error_logs.txt
          echo "Check the Actions logs above for the full traceback." >> error_logs.txt

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # ── Runs ALWAYS, success or failure ─────────────────────────
      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy: only runs if train succeeded
  # ════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "docker build --build-arg RUN_ID=${RUN_ID} -t my-model:${RUN_ID} ."

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."