name: CI/CD ML Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Validate: train the model and log to MLflow
  # ════════════════════════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull the dataset tracked by DVC (uses DagsHub as remote)
      - name: Pull data with DVC
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pip install dvc dvc-s3
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      # Train and log to MLflow — writes model_info.txt with the Run ID
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python train.py

      # Upload model_info.txt so the deploy job can read it
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy: check threshold, then mock-build Docker image
  # ════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: validate          # only runs if validate succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Retrieve model_info.txt from Job 1
      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # Fail the pipeline here if accuracy < 0.85
      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python check_threshold.py

      # Mock Docker build (runs only if threshold check passed)
      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "docker build --build-arg RUN_ID=${RUN_ID} -t my-model:${RUN_ID} ."